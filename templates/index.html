<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbofan Engine RUL Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #1e293b;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.25rem;
        }

        .field input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .field input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .error {
            color: #dc2626;
            text-align: center;
            margin-top: 0.75rem;
            font-size: 0.875rem;
            display: none;
        }

        #result {
            margin-top: 1.25rem;
            padding: 1.25rem;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        #result .rul {
            font-size: 2rem;
            font-weight: 700;
        }

        #result .status {
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .HEALTHY {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .WARNING {
            background: #fef9c3;
            color: #854d0e;
            border: 1px solid #fde047;
        }

        .CRITICAL {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Turbofan Engine RUL Predictor</h1>
        <p class="subtitle">Enter the top 8 sensor readings to predict Remaining Useful Life</p>

        <div class="grid" id="inputs"></div>

        <button id="btn" onclick="predict()">Predict RUL</button>
        <div class="error" id="error"></div>
        <div id="result"></div>
    </div>

    <script>
        const SENSORS = ['sensor_11', 'sensor_9', 'sensor_4', 'sensor_12', 'sensor_7', 'sensor_14', 'sensor_15', 'sensor_21'];

        // Build input fields
        const grid = document.getElementById('inputs');
        SENSORS.forEach(s => {
            const div = document.createElement('div');
            div.className = 'field';
            div.innerHTML = `<label for="${s}">${s}</label><input type="number" step="any" id="${s}" placeholder="Enter value" required>`;
            grid.appendChild(div);
        });

        async function predict() {
            const btn = document.getElementById('btn');
            const err = document.getElementById('error');
            const res = document.getElementById('result');
            const data = {};

            err.style.display = 'none';
            res.style.display = 'none';

            for (const s of SENSORS) {
                const v = document.getElementById(s).value.trim();
                if (v === '') {
                    err.textContent = 'Please fill in all sensor fields.';
                    err.style.display = 'block';
                    return;
                }
                data[s] = parseFloat(v);
            }

            btn.disabled = true;
            btn.textContent = 'Predicting...';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.error) {
                    err.textContent = 'Error: ' + result.error;
                    err.style.display = 'block';
                    return;
                }

                res.className = result.status;
                res.innerHTML = `<div class="rul">${result.rul} cycles</div><div class="status">Status: ${result.status}</div>`;
                res.style.display = 'block';

            } catch (e) {
                err.textContent = 'Request failed: ' + e.message;
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Predict RUL';
            }
        }
    </script>
</body>

</html>
